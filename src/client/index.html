<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveLive! 综合管理系统</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <span class="logo">&hearts; LoveLive! 综合管理</span>
  <div class="nav-links">
    <button class="active" data-page="home" onclick="showPage('home')">首页</button>
    <button data-page="projects" onclick="showPage('projects')">企划</button>
    <button data-page="groups" onclick="showPage('groups')">动漫团</button>
    <button data-page="characters" onclick="showPage('characters')">角色</button>
    <button data-page="dancegroups" onclick="showPage('dancegroups')">舞团</button>
    <button data-page="dancers" onclick="showPage('dancers')">舞见</button>
    <button data-page="rehearsal" onclick="showPage('rehearsal')">排练</button>
  </div>
</nav>

<div class="main">

  <!-- 首页 -->
  <div id="home" class="page active">
    <div class="stat-cards">
      <div class="stat-card" onclick="showPage('projects')">
        <div class="card-bg" style="background-image:url(images/honoka.svg)"></div>
        <div class="num" id="stat-projects">-</div><div class="lbl">企划</div>
      </div>
      <div class="stat-card" onclick="showPage('groups')">
        <div class="card-bg" style="background-image:url(images/chika.svg)"></div>
        <div class="num" id="stat-groups">-</div><div class="lbl">动漫团</div>
      </div>
      <div class="stat-card" onclick="showPage('characters')">
        <div class="card-bg" style="background-image:url(images/ayumu.svg)"></div>
        <div class="num" id="stat-chars">-</div><div class="lbl">角色</div>
      </div>
      <div class="stat-card" onclick="showPage('dancegroups')">
        <div class="card-bg" style="background-image:url(images/kanon.svg)"></div>
        <div class="num" id="stat-dgs">-</div><div class="lbl">舞团</div>
      </div>
      <div class="stat-card" onclick="showPage('dancers')">
        <div class="card-bg" style="background-image:url(images/kanon.svg)"></div>
        <div class="num" id="stat-dancers">-</div><div class="lbl">舞见</div>
      </div>
      <div class="stat-card" onclick="showPage('rehearsal')">
        <div class="card-bg" style="background-image:url(images/kanon.svg)"></div>
        <div class="num" id="stat-seiyuu">-</div><div class="lbl">排练</div>
      </div>
    </div>
    <div id="home-calendar" class="reh-calendar"></div>
    <div id="home-date-rehearsals"></div>
    <h2 style="color:var(--pink);margin-bottom:15px;">最近排练</h2>
    <div id="home-rehearsals"></div>
  </div>

  <!-- 企划 -->
  <div id="projects" class="page">
    <button class="back-home" onclick="showPage('home')">&#9664; 回到首页</button>
    <h2 style="color:var(--pink);margin-bottom:20px;">企划一览</h2>
    <div class="grid" id="project-grid"></div>
  </div>

  <!-- 动漫团 -->
  <div id="groups" class="page">
    <button class="back-home" onclick="showPage('home')">&#9664; 回到首页</button>
    <div class="filter-bar">
      <select id="group-filter-project"><option value="">全部企划</option></select>
    </div>
    <div class="grid" id="group-grid"></div>
  </div>

  <!-- 角色 -->
  <div id="characters" class="page">
    <button class="back-home" onclick="showPage('home')">&#9664; 回到首页</button>
    <div class="filter-bar">
      <input type="text" id="char-search" placeholder="🔍 搜索角色名/爱好/声优/瞳色/特征…（多关键词空格分隔）" title="支持多关键词模糊搜索，空格分隔。可搜索：角色名、爱好、描述、声优名、团体名、瞳色、应援色、血型、互动词。例如：&quot;蓝色 钢琴&quot; 或 &quot;新田 吃面包&quot;">
      <details class="group-select-panel">
        <summary style="color:var(--pink);font-weight:700;cursor:pointer;margin-bottom:10px;">动漫团体筛选 <span style="font-weight:400;font-size:0.75em;color:#999;margin-left:6px;" onclick="selectAllGroups();return false;">全选</span> / <span style="font-weight:400;font-size:0.75em;color:#999;" onclick="deselectAllGroups();return false;">全不选</span></summary>
        <div class="group-mini-cards" id="group-mini-cards"></div>
      </details>
      <select id="char-filter-age">
        <option value="">声优年龄不限</option>
        <option value="20-30">20-30 岁</option>
        <option value="30-40">30-40 岁</option>
        <option value="40-50">40-50 岁</option>
      </select>
    </div>
    <div class="grid" id="char-grid"></div>
  </div>

  <!-- 排练 -->
  <div id="rehearsal" class="page">
    <button class="back-home" onclick="showPage('home')">&#9664; 回到首页</button>
    <div class="reh-header">
      <h2>排练安排</h2>
      <div class="reh-controls">
        <input type="date" id="reh-date-from" title="开始日期">
        <input type="date" id="reh-date-to" title="结束日期">
        <select id="reh-filter-status">
          <option value="all">全部状态</option>
          <option value="available">有空位</option>
          <option value="near_full">将满</option>
          <option value="full">已满</option>
          <option value="unlimited">不限人数</option>
        </select>
        <button class="btn btn-primary" onclick="openAddRehearsal()">+ 新增排练</button>
      </div>
    </div>
    <div id="rehearsal-list"></div>
  </div>

  <!-- 舞团 -->
  <div id="dancegroups" class="page">
    <button class="back-home" onclick="showPage('home')">&#9664; 回到首页</button>
    <h2 style="color:var(--pink);margin-bottom:16px;">舞团</h2>
    <div class="grid" id="dg-mgmt-list"></div>
    <div style="margin-top:40px;user-select:none;color:#999;font-size:0.9em;font-weight:700;margin-bottom:10px;">新建舞团</div>
    <div class="dg-new-form">
      <input type="text" id="dg-new-name" placeholder="输入新舞团名称…" style="flex:1;padding:10px 14px;border-radius:20px;border:2px solid #eee;font-size:0.95em;" onkeydown="if(event.key==='Enter')addDanceGroup()">
      <select id="dg-new-anime-group" style="padding:10px 14px;border-radius:20px;border:2px solid #eee;font-size:0.9em;min-width:140px;">
        <option value="">翻跳团体（可选）</option>
      </select>
      <button class="btn btn-primary" onclick="addDanceGroup()">确认新建</button>
    </div>
  </div>
  <!-- 舞见 -->
  <div id="dancers" class="page">
    <button class="back-home" onclick="showPage('home')">&#9664; 回到首页</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <h2 style="color:var(--pink);">舞见</h2>
      <div style="display:flex;gap:6px;">
        <select id="dancer-dg-filter" onchange="loadDancerList()" style="padding:6px 12px;border-radius:16px;border:2px solid #eee;"></select>
        <input type="text" id="dancer-new-cn" placeholder="搜索 CN名" title="输入CN名实时筛选" oninput="loadDancerList()" style="padding:6px 12px;border-radius:16px;border:2px solid #eee;width:130px;">
        <input type="text" id="dancer-new-qq" placeholder="搜索 QQ" title="输入QQ号实时筛选" oninput="loadDancerList()" style="padding:6px 12px;border-radius:16px;border:2px solid #eee;width:130px;">
        <details class="group-select-panel" id="dancer-char-panel" style="margin-bottom:14px;">
      <summary style="color:var(--pink);font-weight:700;cursor:pointer;font-size:0.9em;">🎭 角色偏见筛选 <span id="dancer-char-label" style="font-weight:400;color:#999;font-size:0.85em;margin-left:4px;"></span></summary>
      <div id="dancer-char-cards" style="margin-top:10px;"></div>
    </details>
    <input type="hidden" id="dancer-char-search">
        <button class="btn btn-primary btn-sm" onclick="openAddDancer()">+ 新建舞见</button>
      </div>
    </div>
    <div id="dancer-mgmt-list"></div>
  </div>

</div>

<!-- 新增排练弹窗 -->
<div class="modal-overlay" id="modal-rehearsal">
  <div class="modal" style="max-width:580px;">
    <h2>新增排练</h2>
    <form id="form-rehearsal" onsubmit="addRehearsal(event)">
      <label>舞团</label>
      <div style="display:flex;gap:8px;">
        <select id="f-dg-sel" onchange="onDgSelect()" style="flex:1;">
          <option value="">选择已有舞团…</option>
        </select>
      </div>
      <input type="text" id="f-dg-new" placeholder="或输入新建舞团名称" style="margin-top:6px;display:none;">
      <label>排练日期</label><input type="date" id="f-date" required>
      <div style="display:flex;gap:12px;">
        <div style="flex:1;"><label>开始时间</label><input type="time" id="f-start" required></div>
        <div style="flex:1;"><label>结束时间</label><input type="time" id="f-end" required></div>
      </div>
      <label>地点</label><input type="text" id="f-loc" required placeholder="如：综合楼 201">
      <label>内容简介</label>
      <textarea id="f-desc" rows="2" placeholder="如：Snow halation 初排"></textarea>
      <div id="reh-init-chars" style="display:none;margin-top:12px;">
        <label>初始舞见分配 <span style="font-weight:400;color:#999;font-size:0.85em;">（在上方选好舞团后出现，填CN名指派，留空则暂缺）</span></label>
        <div id="reh-init-grid" style="display:flex;flex-wrap:wrap;gap:8px;max-height:220px;overflow-y:auto;padding:4px 0;"></div>
      </div>
      <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end;">
        <button type="button" class="btn" onclick="closeModal('modal-rehearsal')">取消</button>
        <button type="submit" class="btn btn-primary">确认添加</button>
      </div>
    </form>
  </div>
</div>

<!-- 新建/编辑舞见弹窗 -->
<div class="modal-overlay" id="modal-dancer-add">
  <div class="modal" style="max-width:420px;">
    <h2 id="dancer-modal-title">新建舞见</h2>
    <form id="form-dancer" onsubmit="submitDancer(event)">
      <label>CN名 <span style="color:#e53935;">*必填</span></label>
      <input type="text" id="f-dancer-cn" required placeholder="如：小明" style="width:100%;padding:10px;border-radius:8px;border:2px solid #eee;margin-bottom:12px;">
      <label>QQ号 <span style="color:#e53935;">*必填</span></label>
      <input type="text" id="f-dancer-qq" required placeholder="如：1234567890" style="width:100%;padding:10px;border-radius:8px;border:2px solid #eee;margin-bottom:12px;">
      <label>所属舞团 <span style="color:#999;font-weight:400;">（可选，后续可修改）</span></label>
      <select id="f-dancer-dg" style="width:100%;padding:10px;border-radius:8px;border:2px solid #eee;margin-bottom:12px;">
        <option value="">暂不加入舞团</option>
      </select>
      <input type="hidden" id="f-dancer-edit-id" value="">
      <div style="margin-top:16px;display:flex;gap:10px;justify-content:flex-end;">
        <button type="button" class="btn" onclick="closeModal('modal-dancer-add')">取消</button>
        <button type="submit" class="btn btn-primary">确认新建</button>
      </div>
    </form>
  </div>
</div>

<!-- 角色详情弹窗 -->
<div class="modal-overlay" id="modal-char">
  <div class="modal" style="max-width:840px;">
    <div id="char-detail-content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-sub">
  <div class="modal" style="max-width:500px;">
    <div id="modal-sub-content"></div>
  </div>
</div>

<script src="js/app.js?v=22"></script>
</body>
</html>
